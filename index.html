<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>متجر rosea_1.8</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  font-family: sans-serif;
  background: #fff;
  margin: 20px;
  direction: rtl;
}
h1 {
  color: #ff4ea0;
}
.product {
  border: 1px solid #ddd;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 15px;
}
button {
  padding: 10px 15px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
}
.add-btn {
  background: #ff4ea0;
  color: white;
  margin-bottom: 20px;
}
.save-btn {
  background: #4CAF50;
  color: white;
}
.cart-btn {
  background: #2196F3;
  color: white;
  float: left;
}
input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}
</style>
</head>
<body>

<h1>متجر rosea_1.8</h1>

<a href="cart.html"><button class="cart-btn">السلة 🛒</button></a>
<br><br><br>

<button class="add-btn" onclick="toggleForm()">➕ إضافة منتج جديد</button>

<div id="form" style="display:none; border:1px solid #ccc; padding:15px; border-radius:10px; background:#fafafa;">
  <h3>إضافة منتج</h3>

  <label>اسم المنتج:</label>
  <input id="pName">

  <label>السعر:</label>
  <input id="pPrice" type="number">

  <label>الألوان (اكتب بالأسماء وافصل بفاصلة):</label>
  <input id="pColors" placeholder="وردي، أحمر، أبيض">

  <label>صورة المنتج:</label>
  <input id="pImg" type="file" accept="image/*">

  <button class="save-btn" onclick="addProduct()">✔️ حفظ المنتج</button>
</div>

<h2>المنتجات</h2>
<div id="products"></div>

<script src="script.js"></script>
</body>
</html>
